<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#080810;font-family:'Outfit',sans-serif;color:#eeeef8;-webkit-tap-highlight-color:transparent;}
input,select,button,textarea{font-family:'Outfit',sans-serif;outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#252535;border-radius:99px;}
/* Layout */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #252535;background:#080810;position:sticky;top:0;z-index:50;}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:#8b7cf8;}
.nav{display:flex;gap:3px;background:#11111c;border-radius:12px;padding:3px;border:1px solid #252535;}
.navbtn{padding:7px 10px;border-radius:8px;border:none;background:transparent;color:#65657a;font-size:13px;cursor:pointer;transition:all .15s;}
.navbtn.on{background:#8b7cf8;color:#fff;}
.gearbtn{background:#11111c;border:1px solid #252535;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:15px;color:#65657a;margin-left:7px;}
.main{padding:18px;max-width:480px;margin:0 auto;min-height:100vh;}
/* Cards */
.card{background:#11111c;border:1px solid #252535;border-radius:18px;padding:18px;margin-bottom:14px;}
.ctitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#65657a;margin-bottom:14px;}
/* Forms */
.inp{width:100%;padding:11px 14px;background:#191926;border:1px solid #252535;border-radius:10px;color:#eeeef8;font-size:14px;}
.inp:focus{border-color:#8b7cf8;}
.lbl{font-size:11px;color:#65657a;margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.fg{margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
/* Buttons */
.btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
.btn-acc{background:#8b7cf8;color:#fff;}
.btn-ok{background:rgba(106,247,168,.12);color:#6af7a8;border:1px solid rgba(106,247,168,.25);}
.btn-gold{background:rgba(247,215,106,.12);color:#f7d76a;border:1px solid rgba(247,215,106,.3);}
.btn-blue{background:rgba(106,184,247,.12);color:#6ab8f7;border:1px solid rgba(106,184,247,.3);}
.btn-ai{background:rgba(139,124,248,.12);color:#8b7cf8;border:1px solid rgba(139,124,248,.3);}
.btn-del{background:transparent;color:#f76a6a;border:1px solid rgba(247,106,106,.25);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;flex-shrink:0;}
.btn-edit{background:rgba(139,124,248,.1);border:1px solid rgba(139,124,248,.25);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;color:#8b7cf8;}
.btn-sm{padding:8px 14px;border-radius:9px;border:1px solid #8b7cf8;background:rgba(139,124,248,.12);color:#8b7cf8;font-size:12px;font-weight:700;cursor:pointer;}
/* Sub tabs */
.stabs{display:flex;gap:6px;margin-bottom:16px;}
.stab{padding:7px 14px;border-radius:8px;border:1px solid #252535;background:transparent;color:#65657a;font-size:12px;font-weight:600;cursor:pointer;}
.stab.on{border-color:#8b7cf8;background:rgba(139,124,248,.12);color:#8b7cf8;}
/* Currency toggle */
.curtog{display:flex;gap:6px;margin-bottom:14px;}
.cbtn{flex:1;padding:9px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;border:1px solid #252535;background:#191926;color:#65657a;}
.cbtn.cop{border-color:#6af7a8;background:rgba(106,247,168,.1);color:#6af7a8;}
.cbtn.usd{border-color:#6ab8f7;background:rgba(106,184,247,.1);color:#6ab8f7;}
/* Charts */
.bar-track{height:5px;background:#191926;border-radius:99px;overflow:hidden;margin-top:5px;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}
/* Transactions */
.txn{display:flex;align-items:center;gap:10px;background:#191926;border-radius:10px;padding:10px 12px;border:1px solid #252535;margin-bottom:8px;}
.ticon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.badge{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:600;}
/* Stat cards */
.statg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:#191926;border-radius:14px;padding:14px;border:1px solid #252535;}
.slbl{font-size:10px;color:#65657a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.sval{font-size:15px;font-weight:700;}
.ssub{font-size:11px;color:#65657a;margin-top:2px;}
/* Banners */
.alert-b{background:rgba(247,106,106,.08);border:1px solid rgba(247,106,106,.35);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;}
.invest-b{background:rgba(247,215,106,.08);border:1px solid rgba(247,215,106,.3);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;}
/* Month nav */
.mnav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.mbtn{background:#191926;border:1px solid #252535;color:#eeeef8;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:16px;}
.mlbl{flex:1;text-align:center;font-weight:700;font-size:15px;}
/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;display:none;}
.overlay.open{display:flex;}
.sheet{background:#11111c;border:1px solid #252535;border-radius:22px 22px 0 0;padding:22px 20px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.handle{width:36px;height:4px;background:#2a2a3a;border-radius:99px;margin:0 auto 20px;}
.sdiv{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#65657a;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #252535;}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.close-btn{background:transparent;border:1px solid #252535;color:#65657a;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px;}
.back-btn{background:transparent;border:1px solid #252535;color:#65657a;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;}
/* Misc */
.empty{text-align:center;padding:30px 0;color:#65657a;}
.empty-i{font-size:36px;margin-bottom:10px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #252535;}
.tipo-row{display:flex;gap:7px;}
.tbtn{flex:1;padding:8px 4px;border-radius:9px;border:1px solid #252535;background:#191926;color:#65657a;font-size:12px;font-weight:600;cursor:pointer;}
.mbrow{display:flex;flex-wrap:wrap;gap:7px;}
.mbtn2{padding:8px 11px;border-radius:9px;border:1px solid #252535;background:#191926;color:#65657a;font-size:12px;font-weight:600;cursor:pointer;}
.cpick{display:flex;gap:8px;flex-wrap:wrap;}
.cdot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.cdot.on{border-color:#fff;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#191926;border:1px solid #8b7cf8;color:#eeeef8;padding:12px 20px;border-radius:12px;font-size:13px;z-index:999;white-space:nowrap;transition:transform .3s;box-shadow:0 4px 24px rgba(0,0,0,.6);}
.toast.show{transform:translateX(-50%) translateY(0);}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.ai-tip{background:#191926;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(139,124,248,.2);}
.confirm-del{background:rgba(247,106,106,.1);border:1px solid rgba(247,106,106,.4);border-radius:12px;padding:14px;}
</style>
</head>

</div>

<script>
// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyC2dQK8nNb6UlU2xHVnhZlkj1_eYfsVzi4",
  authDomain:"nestly-d6c60.firebaseapp.com",
  projectId:"nestly-d6c60",
  storageBucket:"nestly-d6c60.firebasestorage.app",
  messagingSenderId:"940593785810",
  appId:"1:940593785810:web:54b08f337a41cb4aabf60b"
});
const db = firebase.firestore();
const DOC = db.collection('nestly').doc('felipe');

// ═══════════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════════
const DEF_CATS = [
  {id:1, nombre:'🏠 Vivienda',      color:'#7c6af7', tipo:'fijo'},
  {id:2, nombre:'🛒 Mercado',       color:'#6af7a8', tipo:'variable'},
  {id:3, nombre:'🚗 Transporte',    color:'#6ab8f7', tipo:'variable'},
  {id:4, nombre:'🍽️ Restaurantes', color:'#f7a76a', tipo:'antojo'},
  {id:5, nombre:'💊 Salud',         color:'#f76a6a', tipo:'fijo'},
  {id:6, nombre:'🎮 Entretenimiento',color:'#c76af7',tipo:'antojo'},
  {id:7, nombre:'📱 Servicios',     color:'#f7c76a', tipo:'fijo'},
  {id:8, nombre:'👗 Ropa',          color:'#f76ab8', tipo:'antojo'},
  {id:9, nombre:'📚 Educación',     color:'#6af7f7', tipo:'fijo'},
  {id:10,nombre:'💼 Negocios',      color:'#a8f76a', tipo:'variable'},
  {id:11,nombre:'📈 Inversiones',   color:'#f7e76a', tipo:'variable'},
  {id:12,nombre:'🐾 Mascotas',      color:'#f7a76a', tipo:'variable'},
  {id:13,nombre:'🎁 Otros',         color:'#aaaaaa', tipo:'variable'}
];
const DEF_MEDIOS = [
  {id:1,tipo:'cuenta', nombre:'Cuenta de ahorros',banco:'Bancolombia',franquicia:'',color:'#6af7a8'},
  {id:2,tipo:'tarjeta',nombre:'Visa Oro',          banco:'Bancolombia',franquicia:'Visa',color:'#6ab8f7'},
  {id:3,tipo:'tarjeta',nombre:'Mastercard',        banco:'Davivienda', franquicia:'Mastercard',color:'#f7a76a'},
  {id:4,tipo:'efectivo',nombre:'Efectivo',         banco:'',           franquicia:'',color:'#f7c76a'}
];
const COLORS = ['#7c6af7','#6af7a8','#6ab8f7','#f7a76a','#f76a6a','#c76af7','#f7c76a','#f76ab8','#6af7f7','#a8f76a','#f7e76a','#f7d76a','#aaaaaa'];
const FRANQ  = ['Visa','Mastercard','Amex','Diners','Discover','Otro'];
const FREQS  = ['mensual','quincenal','semanal','anual','único'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const TC = {fijo:'#6ab8f7',variable:'#6af7a8',antojo:'#f7a76a'};
const TI = {fijo:'📌',variable:'🔄',antojo:'✨'};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let S = {
  gastos:[], ingresos:[], alertas:[],
  mediosPago: DEF_MEDIOS,
  ahorros:[{id:1,plataforma:'Trii',instrumento:'Fondo conservador',meta:0,currency:'USD',snapshots:[]}],
  categorias: DEF_CATS
};
let tab='dashboard', month=new Date().getMonth(), year=new Date().getFullYear(), rate=4200;
let gCur='COP',iCur='COP',aCur='COP',sCur='USD',gTipo='',gMedio='';
let subG='reg',subI='reg',subA='nueva',subAh='ver';
let cfgView='main', editMedioId=null, editCatId=null;
let pdfTipos={}, saveT=null, ready=false;

// ═══════════════════════════════════════════════════
// FIREBASE SYNC
// ═══════════════════════════════════════════════════
DOC.get().then(d=>{
  if(d.exists){const v=d.data();if(v&&v.gastos){S=v;if(!S.categorias)S.categorias=DEF_CATS;}}
  ready=true; render();
}).catch(()=>{ready=true;render();});

DOC.onSnapshot(d=>{
  if(!ready)return;
  if(d.exists){const v=d.data();if(v&&v.gastos&&JSON.stringify(v)!==JSON.stringify(S)){S=v;if(!S.categorias)S.categorias=DEF_CATS;render();}}
});

function save(){
  clearTimeout(saveT);
  saveT=setTimeout(()=>{if(ready)DOC.set(S).catch(console.error);},1500);
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const fmtCOP = n=>'$'+Math.round(n).toLocaleString('es-CO');
const fmtUSD = n=>'$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt    = (a,c)=>c==='USD'?fmtUSD(a)+' USD':fmtCOP(a)+' COP';
const toCOP  = (a,c)=>c==='USD'?a*rate:a;
const fmtD   = s=>new Date(s+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short'});
const cap    = s=>s.charAt(0).toUpperCase()+s.slice(1);
const today  = ()=>new Date().toISOString().split('T')[0];
const dSince = d=>!d?999:Math.floor((Date.now()-new Date(d+'T12:00:00'))/86400000);
const medIcon= t=>t==='efectivo'?'💵':t==='cuenta'?'🏦':'💳';
const getCat = n=>S.categorias.find(c=>c.nombre===n);
const catClr = n=>{const c=getCat(n);return c?c.color:'#aaaaaa';};
const catTipo= n=>{const c=getCat(n);return c?c.tipo:'variable';};
const tipoOf = g=>g.tipo||catTipo(g.cat)||'variable';
const getMed = id=>S.mediosPago.find(m=>m.id===parseInt(id));
const getMG  = ()=>S.gastos.filter(g=>{const d=new Date(g.date+'T12:00:00');return d.getMonth()===month&&d.getFullYear()===year;});
const totI   = ()=>S.ingresos.reduce((s,i)=>{const b=toCOP(i.amount,i.currency);return s+(i.freq==='quincenal'?b*2:i.freq==='semanal'?b*4.33:i.freq==='anual'?b/12:b);},0);
const alertSt= a=>{const n=new Date(),d=new Date(n.getFullYear(),n.getMonth(),a.day),dl=Math.round((d-n)/86400000);return{dl,st:dl<0?'v':dl<=a.remind?(dl===0?'h':'p'):'ok'};};

// ═══════════════════════════════════════════════════
// UI UTILS
// ═══════════════════════════════════════════════════
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function goTab(t){
  tab=t;
  document.querySelectorAll('.navbtn').forEach((b,i)=>b.classList.toggle('on',['dashboard','gastos','ingresos','ahorros','alertas'][i]===t));
  render();
}

function openModal(id){document.getElementById('m-'+id).classList.add('open');if(id==='cfg'){cfgView='main';renderCfg();}}
function closeModal(id){document.getElementById('m-'+id).classList.remove('open');}

function chMonth(d){month+=d;if(month>11){month=0;year++;}if(month<0){month=11;year--;}render();}

function setCur(which,val){if(which==='g')gCur=val;else if(which==='i')iCur=val;else if(which==='a')aCur=val;else sCur=val;render();}

function curtog(which,cur){
  return `<div class="curtog">
    <button class="cbtn ${cur==='COP'?'cop':''}" onclick="setCur('${which}','COP')">COP $</button>
    <button class="cbtn ${cur==='USD'?'usd':''}" onclick="setCur('${which}','USD')">USD $</button>
  </div>`;}

function colorPick(sel,fn){
  return `<div class="cpick">${COLORS.map(c=>`<div class="cdot ${sel===c?'on':''}" style="background:${c}" onclick="${fn}('${c}')"></div>`).join('')}</div>`;}

function setColor(c){_selColor=c;document.querySelectorAll('#active-form .cdot').forEach(d=>{d.classList.toggle('on',d.style.background===c||d.style.backgroundColor===c);});} 
let _selColor='#6ab8f7';

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function addGasto(){
  const d=v('g-desc'),a=parseFloat(v('g-amt')||0),dt=v('g-date'),cat=v('g-cat'),n=v('g-notes');
  if(!d||!a||!dt||!gMedio){toast('⚠️ Completa todos los campos incluyendo medio de pago');return;}

ht:800">${fmtCOP(tot)} (${pct}%)</span></div><table><thead><tr><th>Descripción</th><th>Categoría</th><th>Fecha</th><th style="text-align:right">Monto</th></tr></thead><tbody>${gr[t].map(g=>`<tr><td>${g.desc}</td><td>${g.cat}</td><td>${fmtD(g.date)}</td><td style="text-align:right;font-weight:600">${fmt(g.amount,g.currency)}</td></tr>`).join('')}</tbody></table></div>`;}).join('')}<div class="ft">Nestly · Tu asistente financiero personal</div></body></html>`;

// ── AI Tips ──
function openAI(){
  openModal('ai');
  const mg=getMG(),tg=mg.reduce((s,g)=>s+toCOP(g.amount,g.currency),0),ti=totI(),bal=ti-tg;
  const tasa=ti>0?((bal/ti)*100).toFixed(1):'0.0';
  const ct={};mg.forEach(g=>{ct[g.cat]=(ct[g.cat]||0)+toCOP(g.amount,g.currency);});
  const cs=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  const pt=t=>mg.filter(g=>tipoOf(g)===t).reduce((s,g)=>s+toCOP(g.amount,g.currency),0);
  const fijo=pt('fijo'),variable=pt('variable'),antojo=pt('antojo');
  const tips=[];
  if(!mg.length){renderAI(['📝 Empieza a registrar||Aún no tienes gastos este mes. Entre más datos tengas, más útiles serán los consejos.']);return;}
  const t=parseFloat(tasa);
  if(t<0)tips.push('🚨 Estás gastando más de lo que ingresa||Tu balance es negativo en '+fmtCOP(Math.abs(bal))+'. Revisa los gastos variables y antojos primero.');
  else if(t<10)tips.push('⚠️ Tasa de ahorro muy baja ('+tasa+'%)||Intenta reducir '+fmtCOP(Math.round(ti*0.1))+' este mes para llegar al 10% de ahorro.');
  else if(t<20)tips.push('📈 Vas bien ('+tasa+'% de ahorro)||Solo necesitas reducir '+fmtCOP(Math.max(0,Math.round(ti*0.2)-bal))+' más para llegar al 20%.');
  else tips.push('🏆 Excelente tasa de ahorro: '+tasa+'%||Estás ahorrando '+fmtCOP(bal)+'. Considera invertir ese excedente en tu portafolio.');
  if(antojo>0){const p=((antojo/tg)*100).toFixed(1);if(parseFloat(p)>30)tips.push('✨ Antojos altos ('+p+'%)||Gastaste '+fmtCOP(antojo)+' en antojos. Reducir un 30% libera '+fmtCOP(Math.round(antojo*.3))+' para ahorro.');else tips.push('✨ Antojos bajo control ('+p+'%)||'+fmtCOP(antojo)+' en antojos — rango saludable. Sigue así.');}
  if(fijo>0){const p=((fijo/tg)*100).toFixed(1);if(parseFloat(p)>60)tips.push('🏠 Gastos fijos muy altos ('+p+'%)||Con '+fmtCOP(fijo)+' en fijos tienes poco margen. Evalúa si alguna suscripción ya no genera valor.');else tips.push('📌 Gastos fijos estables ('+p+'%)||'+fmtCOP(fijo)+' en compromisos fijos. Buen manejo.');}
  if(cs.length>0){const[cat,val]=cs[0];const p=((val/tg)*100).toFixed(1);tips.push('🔍 Mayor gasto: '+cat+' ('+p+'%)||Gastaste '+fmtCOP(Math.round(val))+'. Vale revisar si hay oportunidad de optimizar.');}
  if(bal>0&&ti>0){const an=bal*12;tips.push('💡 Proyección anual: '+fmtCOP(an)+'||Si mantienes este ritmo ahorras '+fmtCOP(an)+'/año. Invertido al 10% anual, en 5 años serían '+fmtCOP(Math.round(an*6.1))+'.');}
  renderAI(tips);
}

// ── AHORROS ──
function renderAhorros(){
  let h=`<div style="font-size:20px;font-weight:800;margin-bottom:4px">Ahorros e Inversiones</div>
  <div style="font-size:12px;color:#65657a;margin-bottom:14px">Actualización recomendada cada 15 días</div>
  <div class="stabs">
    <button class="stab ${subAh==='ver'?'on':''}" onclick="subAh='ver';render()">Ver todo</button>
    <button class="stab ${subAh==='actualizar'?'on':''}" onclick="subAh='actualizar';render()">Actualizar</button>
    <button class="stab ${subAh==='nuevo'?'on':''}" onclick="subAh='nuevo';render()">+ Nuevo</button>
  </div>`;

  if(subAh==='ver'){
    if(!S.ahorros.length)h+=`<div class="empty"><div class="empty-i">🏦</div>Sin objetivos</div>`;
    else S.ahorros.forEach(a=>{
      const last=a.snapshots[a.snapshots.length-1],prev=a.snapshots[a.snapshots.length-2];
      const val=last?last.valor:0,diff=last&&prev?((last.valor-prev.valor)/prev.valor*100).toFixed(1):null;
      const dias=last?dSince(last.fecha):null,nu=!last||dias>=15;
      const pts=a.snapshots.length>=2?miniChart(a.snapshots):'<div style="font-size:11px;color:#65657a;text-align:center;padding:8px 0">Registra 2+ actualizaciones para la gráfica</div>';
      h+=`<div class="card" style="border-color:${nu?'rgba(247,215,106,.3)':'#252535'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><div style="font-weight:700;font-size:15px">${a.plataforma}</div><div style="font-size:12px;color:#65657a;margin-top:2px">${a.instrumento}</div></div>
          <button class="btn-del" onclick="delAhorro(${a.id})">✕</button>
        </div>
        <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:10px">
          <div><div style="font-size:10px;color:#65657a;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">Valor actual</div>
          <div style="font-size:22px;font-weight:800;color:#f7d76a">${a.currency==='USD'?fmtUSD(val):fmtCOP(val)} ${a.currency}</div>
          ${a.currency==='USD'?`<div style="font-size:11px;color:#65657a">≈ ${fmtCOP(val*rate)} COP</div>`:''}</div>
          ${diff!==null?`<div style="margin-bottom:4px;font-size:13px;font-weight:700;color:${parseFloat(diff)>=0?'#6af7a8':'#f76a6a'}">${parseFloat(diff)>=0?'▲':'▼'} ${Math.abs(diff)}%</div>`:''}
        </div>
        ${a.meta>0?`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#65657a;margin-bottom:4px"><span>Meta: ${a.currency==='USD'?fmtUSD(a.meta):fmtCOP(a.meta)} ${a.currency}</span><span>${Math.min(100,(val/a.meta*100)).toFixed(1)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,val/a.meta*100).toFixed(1)}%;background:#f7d76a"></div></div></div>`:''}
        ${pts}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
          <div style="font-size:11px;color:${nu?'#f7d76a':'#65657a'}">${!last?'Sin actualizaciones aún':nu?`⚠️ Hace ${dias} días`:`✓ Hace ${dias} días`}</div>
          <span style="font-size:11px;color:#65657a">${a.snapshots.length} registros</span>
        </div>
      </div>`;
    });
  } else if(subAh==='actualizar'){
    h+=`<div class="card">
      <div class="fg"><label class="lbl">Selecciona el ahorro</label>
        <select class="inp" id="sn-id"><option value="">— Seleccionar —</option>${S.ahorros.map(a=>`<option value="${a.id}">${a.plataforma} · ${a.instrumento}</option>`).join('')}</select>
      </div>
      <div class="fg"><label class="lbl">Nuevo valor</label><input class="inp" id="sn-val" type="number" placeholder="0.00"></div>
      <div class="fg"><label class="lbl">Nota (opcional)</label><input class="inp" id="sn-nota" placeholder="Ej: Mes positivo..."></div>
      <button class="btn btn-gold" onclick="addSnap()">📊 Registrar actualización</button>
    </div>`;
  } else {
    h+=`<div class="card">
      ${curtog('s',sCur)}
      <div class="fg"><label class="lbl">Plataforma</label><input class="inp" id="s-plat" placeholder="Ej: Trii, Binance..."></div>
      <div class="fg"><label class="lbl">Instrumento / Fondo</label><input class="inp" id="s-instr" placeholder="Ej: Fondo conservador, ETF..."></div>
      <div class="fg"><label class="lbl">Meta (opcional)</label><input class="inp" id="s-meta" type="number" placeholder="0"></div>
      <button class="btn btn-gold" onclick="addAhorro()">Crear objetivo</button>
    </div>`;
  }
  return h;
}

      </div>`;

    });
    h+=`</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">`;
    ['fijo','variable','antojo'].forEach(t=>{h+=`<div style="background:${TC[t]}10;border:1px solid ${TC[t]}30;border-radius:10px;padding:10px;text-align:center"><div style="font-size:10px;color:${TC[t]};font-weight:700;margin-bottom:3px">${TI[t]} ${cap(t)}</div><div style="font-size:13px;font-weight:800;color:${TC[t]}">${fmtCOP(tots[t])}</div></div>`;});
    h+=`</div><button class="btn btn-blue" onclick="genPDF()">Generar e imprimir PDF</button>`;
  }
  document.getElementById('s-pdf').innerHTML=h;
}

// ── AI MODAL ──
function renderAI(tips){
  let h=`<div class="handle"></div>
  <div class="shdr"><span style="font-weight:800;font-size:18px">✨ Consejos IA</span><button class="close-btn" onclick="closeModal('ai')">Cerrar</button></div>
  <div style="font-size:12px;color:#65657a;margin-bottom:16px">${MONTHS[month]} ${year}</div>`;
  tips.forEach(tip=>{
    const[title,body]=tip.split('||');
    h+=`<div class="ai-tip"><div style="font-size:14px;font-weight:700;color:#8b7cf8;margin-bottom:${body?6:0}px">${title}</div>${body?`<div style="font-size:13px;color:#eeeef8;line-height:1.55">${body}</div>`:''}</div>`;
  });
  h+=`<button class="btn btn-ai" style="margin-top:4px" onclick="openAI()">🔄 Regenerar</button>`;
  document.getElementById('s-ai').innerHTML=h;
}

// ── MINI CHART ──
function miniChart(snaps){
  const vals=snaps.map(x=>x.valor),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,W=260,H=56;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*(H-8)-4}`).join(' ');
  const up=vals[vals.length-1]>=vals[0],col=up?'#6af7a8':'#f76a6a';
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1))*W,y=H-((v-mn)/rng)*(H-8)-4;return`<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`;}).join('')}</svg>`;
}

render();
