<style>
*{box-sizing:border-box;margin:0;padding:0;}
body,html{background:#080810;font-family:'Outfit',sans-serif;color:#eeeef8;min-height:100vh;-webkit-tap-highlight-color:transparent;}
input,select,button{font-family:'Outfit',sans-serif;outline:none;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#252535;border-radius:99px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #252535;background:#080810;position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:#8b7cf8;}
.navtabs{display:flex;gap:3px;background:#11111c;border-radius:12px;padding:3px;border:1px solid #252535;}
.navtab{padding:7px 10px;border-radius:8px;border:none;background:transparent;color:#65657a;font-size:13px;cursor:pointer;}
.navtab.active{background:#8b7cf8;color:#fff;}
.gearbtn{background:#11111c;border:1px solid #252535;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:15px;color:#65657a;margin-left:7px;}
.main{padding:18px;max-width:480px;margin:0 auto;}
.card{background:#11111c;border:1px solid #252535;border-radius:18px;padding:18px;margin-bottom:14px;}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#65657a;margin-bottom:14px;}
.inp{width:100%;padding:11px 14px;background:#191926;border:1px solid #252535;border-radius:10px;color:#eeeef8;font-size:14px;font-family:'Outfit',sans-serif;}
.inp:focus{border-color:#8b7cf8;}
.lbl{font-size:11px;color:#65657a;margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;}
.btn-primary{width:100%;padding:13px;border-radius:12px;border:none;background:#8b7cf8;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.btn-del{background:transparent;color:#f76a6a;border:1px solid rgba(247,106,106,.25);border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;flex-shrink:0;}
.subtabs{display:flex;gap:6px;margin-bottom:16px;}
.subtab{padding:7px 14px;border-radius:8px;border:1px solid #252535;background:transparent;color:#65657a;font-size:12px;font-weight:600;cursor:pointer;}
.subtab.active{border-color:#8b7cf8;background:rgba(139,124,248,.12);color:#8b7cf8;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bar-track{height:5px;background:#191926;border-radius:99px;overflow:hidden;margin-top:5px;}
.bar-fill{height:100%;border-radius:99px;transition:width .7s ease;}
.txn{display:flex;align-items:center;gap:10px;background:#191926;border-radius:10px;padding:10px 12px;border:1px solid #252535;margin-bottom:8px;}
.txn-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.badge{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:#11111c;border:1px solid #252535;border-radius:22px 22px 0 0;padding:22px 20px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.handle{width:36px;height:4px;background:#2a2a3a;border-radius:99px;margin:0 auto 20px;}
.sdiv{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#65657a;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #252535;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#191926;border:1px solid #8b7cf8;color:#eeeef8;padding:12px 20px;border-radius:12px;font-size:13px;z-index:999;white-space:nowrap;transition:transform .3s ease;box-shadow:0 4px 24px rgba(0,0,0,.6);}
.toast.show{transform:translateX(-50%) translateY(0);}
.curtoggle{display:flex;gap:6px;margin-bottom:14px;}
.curbtn{flex:1;padding:9px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;border:1px solid #252535;background:#191926;color:#65657a;}
.curbtn.cop{border-color:#6af7a8;background:rgba(106,247,168,.1);color:#6af7a8;}
.curbtn.usd{border-color:#6ab8f7;background:rgba(106,184,247,.1);color:#6ab8f7;}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.statcard{background:#191926;border-radius:14px;padding:14px;border:1px solid #252535;}
.statcard-label{font-size:10px;color:#65657a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;}
.statcard-val{font-size:15px;font-weight:700;}
.statcard-sub{font-size:11px;color:#65657a;margin-top:2px;}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.month-btn{background:#191926;border:1px solid #252535;color:#eeeef8;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:16px;}
.month-label{flex:1;text-align:center;font-weight:700;font-size:15px;}
.empty{text-align:center;padding:30px 0;color:#65657a;}
.empty-icon{font-size:36px;margin-bottom:10px;}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.alert-banner{background:rgba(247,106,106,.08);border:1px solid rgba(247,106,106,.35);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;}
.invest-banner{background:rgba(247,215,106,.08);border:1px solid rgba(247,215,106,.3);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;}
.tipo-btns{display:flex;gap:7px;}
.tipo-btn{flex:1;padding:8px 4px;border-radius:9px;border:1px solid #252535;background:#191926;color:#65657a;font-size:12px;font-weight:600;cursor:pointer;}
.medio-btns{display:flex;flex-wrap:wrap;gap:7px;}
.medio-btn{padding:8px 11px;border-radius:9px;border:1px solid #252535;background:#191926;color:#65657a;font-size:12px;font-weight:600;cursor:pointer;}
.color-pick{display:flex;gap:8px;flex-wrap:wrap;}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.color-dot.sel{border-color:#fff;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #252535;}
.ai-tip{background:#191926;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(139,124,248,.2);}
.ai-tip-title{font-size:14px;font-weight:700;color:#8b7cf8;margin-bottom:6px;}
.ai-tip-body{font-size:13px;color:#eeeef8;line-height:1.55;}
.pdf-tipo-btns{display:flex;gap:4px;}
.pdf-tipo-btn{padding:4px 7px;border-radius:6px;border:1px solid #252535;background:#11111c;color:#65657a;font-size:10px;font-weight:600;cursor:pointer;}
.confirm-del{background:rgba(247,106,106,.1);border:1px solid rgba(247,106,106,.4);border-radius:12px;padding:14px;}
.hidden{display:none;}
</style>

<script>
// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC2dQK8nNb6UlU2xHVnhZlkj1_eYfsVzi4",
  authDomain: "nestly-d6c60.firebaseapp.com",
  projectId: "nestly-d6c60",
  storageBucket: "nestly-d6c60.firebasestorage.app",
  messagingSenderId: "940593785810",
  appId: "1:940593785810:web:54b08f337a41cb4aabf60b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC = db.collection('nestly').doc('felipe');

// ── Constants ─────────────────────────────────────────────
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CAT_COLORS={'🏠 Vivienda':'#7c6af7','🛒 Mercado':'#6af7a8','🚗 Transporte':'#6ab8f7','🍽️ Restaurantes':'#f7a76a','💊 Salud':'#f76a6a','🎮 Entretenimiento':'#c76af7','📱 Servicios':'#f7c76a','👗 Ropa':'#f76ab8','📚 Educación':'#6af7f7','💼 Negocios':'#a8f76a','📈 Inversiones':'#f7e76a','🎁 Otros':'#aaaaaa'};
const CATS=Object.keys(CAT_COLORS);
const FREQS=['mensual','quincenal','semanal','anual','único'];
const FRANQUICIAS=['Visa','Mastercard','Amex','Diners','Discover','Otro'];
const COLORS=['#6af7a8','#6ab8f7','#f7a76a','#c76af7','#f76ab8','#f7c76a','#f76a6a','#6af7f7','#a8f76a','#f7d76a','#8b7cf8','#f78a6a'];
const CAT_TIPO={'🏠 Vivienda':'fijo','📱 Servicios':'fijo','💊 Salud':'fijo','📚 Educación':'fijo','🛒 Mercado':'variable','🚗 Transporte':'variable','💼 Negocios':'variable','📈 Inversiones':'variable','🍽️ Restaurantes':'antojo','🎮 Entretenimiento':'antojo','👗 Ropa':'antojo','🎁 Otros':'variable'};
const TC={fijo:'#6ab8f7',variable:'#6af7a8',antojo:'#f7a76a'};
const TI={fijo:'📌',variable:'🔄',antojo:'✨'};

// ── State ─────────────────────────────────────────────────
let state = {
  gastos:[],ingresos:[],alertas:[],
  mediosPago:[
    {id:1,tipo:'cuenta',nombre:'Cuenta de ahorros',banco:'Bancolombia',franquicia:'',color:'#6af7a8'},
    {id:2,tipo:'tarjeta',nombre:'Visa Oro',banco:'Bancolombia',franquicia:'Visa',color:'#6ab8f7'},
    {id:3,tipo:'tarjeta',nombre:'Mastercard',banco:'Davivienda',franquicia:'Mastercard',color:'#f7a76a'},
    {id:4,tipo:'efectivo',nombre:'Efectivo',banco:'',franquicia:'',color:'#f7c76a'}
  ],
  ahorros:[{id:1,plataforma:'Trii',instrumento:'Fondo conservador',meta:0,currency:'USD',snapshots:[]}]
};
let tab='dashboard', month=new Date().getMonth(), year=new Date().getFullYear(), rate=4200;
let gCur='COP',iCur='COP',aCur='COP',sCur='USD';
let gTipo='',gMedio='';
let subGastos='reg',subIngresos='reg',subAlertas='nueva',subAhorros='ver';
let cfgTab='medios',editMedioId=undefined;
let pdfTipos={};
let saveTimer=null,cloudReady=false;

// ── Firebase sync ─────────────────────────────────────────
DOC.get().then(doc=>{
  if(doc.exists){const d=doc.data();if(d&&d.gastos)state=d;}
  cloudReady=true;
  render();
}).catch(()=>{cloudReady=true;render();});

DOC.onSnapshot(doc=>{
  if(!cloudReady)return;
  if(doc.exists){
    const d=doc.data();
    if(d&&d.gastos&&JSON.stringify(d)!==JSON.stringify(state)){state=d;render();}
  }
});

function saveCloud(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ if(cloudReady) DOC.set(state).catch(console.error); },1500);
}

// ── Helpers ───────────────────────────────────────────────
const fmtCOP=n=>'$'+Math.round(n).toLocaleString('es-CO');
const fmtUSD=n=>'$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt=(a,c)=>c==='USD'?fmtUSD(a)+' USD':fmtCOP(a)+' COP';
const toCOP=(a,c)=>c==='USD'?a*rate:a;
const fmtDate=s=>new Date(s+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short'});
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
const today=()=>new Date().toISOString().split('T')[0];
const daysSince=d=>!d?999:Math.floor((Date.now()-new Date(d+'T12:00:00'))/86400000);
const medIcon=t=>t==='efectivo'?'💵':t==='cuenta'?'🏦':'💳';
const tipoOf=g=>g.tipo||CAT_TIPO[g.cat]||'variable';
const alertSt=a=>{const now=new Date(),due=new Date(now.getFullYear(),now.getMonth(),a.day),dl=Math.round((due-now)/86400000);return{dl,status:dl<0?'vencido':dl<=a.remind?(dl===0?'hoy':'pronto'):'ok'};};
const getMedio=id=>state.mediosPago.find(m=>m.id===parseInt(id));

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function setTab(t){
  tab=t;
  document.querySelectorAll('.navtab').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','gastos','ingresos','ahorros','alertas'][i]===t);
  });
  render();
}

function chMonth(d){
  month+=d;
  if(month>11){month=0;year++;}
  if(month<0){month=11;year--;}
  render();
}

// ── Derived ───────────────────────────────────────────────
function getMonthGastos(){
  return state.gastos.filter(g=>{const d=new Date(g.date+'T12:00:00');return d.getMonth()===month&&d.getFullYear()===year;});
}

// ── Actions ───────────────────────────────────────────────
function addGasto(){
  const desc=document.getElementById('g-desc').value.trim();
  const amt=parseFloat(document.getElementById('g-amt').value);
  const date=document.getElementById('g-date').value;
  const cat=document.getElementById('g-cat').value;
  const notes=document.getElementById('g-notes').value.trim();
  if(!desc||!amt||!date||!gMedio){showToast('⚠️ Completa todos los campos incluyendo medio de pago');return;}
  state.gastos.push({id:Date.now(),desc,amount:amt,currency:gCur,date,cat,notes,medio:parseInt(gMedio),tipo:gTipo||CAT_TIPO[cat]||'variable'});
  saveCloud();
  document.getElementById('g-desc').value='';document.getElementById('g-amt').value='';document.getElementById('g-notes').value='';
  gMedio='';gTipo='';
  showToast('✅ Gasto registrado');render();
}
function delGasto(id){state.gastos=state.gastos.filter(g=>g.id!==id);saveCloud();showToast('🗑️ Eliminado');render();}

function addIngreso(){
  const name=document.getElementById('i-name').value.trim();
  const amt=parseFloat(document.getElementById('i-amt').value);
  const freq=document.getElementById('i-freq').value;
  const day=parseInt(document.getElementById('i-day').value)||1;
  if(!name||!amt){showToast('⚠️ Completa los campos');return;}
  state.ingresos.push({id:Date.now(),name,amount:amt,currency:iCur,freq,day});
  saveCloud();
  document.getElementById('i-name').value='';document.getElementById('i-amt').value='';document.getElementById('i-day').value='';
  showToast('✅ Ingreso agregado');render();
}
function delIngreso(id){state.ingresos=state.ingresos.filter(i=>i.id!==id);saveCloud();showToast('🗑️ Eliminado');render();}

function addAlerta(){
  const name=document.getElementById('a-name').value.trim();
  const amt=parseFloat(document.getElementById('a-amt').value);
  const day=parseInt(document.getElementById('a-day').value);
  const cat=document.getElementById('a-cat').value;
  const remind=parseInt(document.getElementById('a-remind').value);
  if(!name||!amt||!day){showToast('⚠️ Completa los campos');return;}
  state.alertas.push({id:Date.now(),name,amount:amt,currency:aCur,day,cat,remind});
  saveCloud();
  document.getElementById('a-name').value='';document.getElementById('a-amt').value='';document.getElementById('a-day').value='';
  showToast('🔔 Alerta creada');render();
}
function delAlerta(id){state.alertas=state.alertas.filter(a=>a.id!==id);saveCloud();showToast('🗑️ Eliminado');render();}

function addAhorro(){
  const plat=document.getElementById('s-plat').value.trim();
  const instr=document.getElementById('s-instr').value.trim();
  const meta=parseFloat(document.getElementById('s-meta').value)||0;
  if(!plat||!instr){showToast('⚠️ Completa plataforma e instrumento');return;}
  state.ahorros.push({id:Date.now(),plataforma:plat,instrumento:instr,meta,currency:sCur,snapshots:[]});
  saveCloud();
  document.getElementById('s-plat').value='';document.getElementById('s-instr').value='';document.getElementById('s-meta').value='';
  showToast('💰 Objetivo creado');render();
}
function delAhorro(id){state.ahorros=state.ahorros.filter(a=>a.id!==id);saveCloud();showToast('🗑️ Eliminado');render();}

function addSnap(){
  const id=parseInt(document.getElementById('sn-id').value);
  const val=parseFloat(document.getElementById('sn-val').value);
  const nota=document.getElementById('sn-nota').value.trim();
  if(!id||!val){showToast('⚠️ Selecciona el ahorro e ingresa el valor');return;}
  state.ahorros=state.ahorros.map(a=>a.id===id?{...a,snapshots:[...a.snapshots,{fecha:today(),valor:val,nota}]}:a);
  saveCloud();
  document.getElementById('sn-val').value='';document.getElementById('sn-nota').value='';
  showToast('📊 Actualización registrada');render();
}

// ── Config / Medios ───────────────────────────────────────

function saveMedio(){
  const nom=document.getElementById('m-nom').value.trim();

tyle="font-weight:800">${fmtCOP(tot)} (${pct}%)</span></div><table><thead><tr><th>Descripción</th><th>Categoría</th><th>Fecha</th><th style="text-align:right">Monto</th></tr></thead><tbody>${grupos[tipo].map(g=>`<tr><td>${g.desc}</td><td>${g.cat}</td><td>${fmtDate(g.date)}</td><td style="text-align:right;font-weight:600">${fmt(g.amount,g.currency)}</td></tr>`).join('')}</tbody></table></div>`;}).join('')}<div class="footer">Nestly · Tu asistente financiero personal</div></body></html>`;

// ── AI Tips ───────────────────────────────────────────────
function openAI(){
  document.getElementById('modal-ai').classList.remove('hidden');
  const mg=getMonthGastos();
  const totGastos=mg.reduce((s,g)=>s+toCOP(g.amount,g.currency),0);
  const totIngr=getTotIngr();
  const bal=totIngr-totGastos;
  const tasa=totIngr>0?((bal/totIngr)*100).toFixed(1):'0.0';
  const catTot={};mg.forEach(g=>{catTot[g.cat]=(catTot[g.cat]||0)+toCOP(g.amount,g.currency);});
  const catSorted=Object.entries(catTot).sort((a,b)=>b[1]-a[1]);
  const porTipo=t=>mg.filter(g=>tipoOf(g)===t).reduce((s,g)=>s+toCOP(g.amount,g.currency),0);
  const fijo=porTipo('fijo'),variable=porTipo('variable'),antojo=porTipo('antojo');
  const tips=[];
  if(mg.length===0){renderAIModal(['📝 Empieza a registrar||Aún no tienes gastos este mes. Comienza hoy — entre más datos tengas, más útiles serán los consejos.']);return;}
  const t=parseFloat(tasa);
  if(t<0) tips.push('🚨 Estás gastando más de lo que ingresa||Tu balance es negativo en '+fmtCOP(Math.abs(bal))+'. Revisa los gastos variables y antojos — son los más fáciles de reducir temporalmente.');
  else if(t<10) tips.push('⚠️ Tu tasa de ahorro es muy baja ('+tasa+'%)||Lo ideal es ahorrar al menos el 20%. Intenta reducir '+fmtCOP(Math.round(totIngr*0.1))+' en gastos este mes para llegar al 10%.');
  else if(t<20) tips.push('📈 Vas bien pero puedes mejorar ('+tasa+'% de ahorro)||Estás ahorrando '+fmtCOP(bal)+' este mes. Solo necesitas reducir '+fmtCOP(Math.round(totIngr*0.2)-bal)+' más para llegar al 20%.');
  else tips.push('🏆 Excelente tasa de ahorro: '+tasa+'%||Estás ahorrando '+fmtCOP(bal)+' este mes. Considera invertir ese excedente en tu portafolio de Trii.');
  if(antojo>0){const p=((antojo/totGastos)*100).toFixed(1);if(parseFloat(p)>30) tips.push('✨ Los antojos representan el '+p+'% de tus gastos||Gastaste '+fmtCOP(antojo)+'. Reducir un 30% de esto libera '+fmtCOP(Math.round(antojo*0.3))+' para ahorro.');else tips.push('✨ Antojos bajo control ('+p+'%)||Gastaste '+fmtCOP(antojo)+' en antojos — está dentro de un rango saludable.');}
  if(fijo>0){const p=((fijo/totGastos)*100).toFixed(1);if(parseFloat(p)>60) tips.push('🏠 Gastos fijos muy altos ('+p+'%)||Con '+fmtCOP(fijo)+' en compromisos fijos tienes poco margen. Evalúa si alguna suscripción ya no genera valor real.');else tips.push('📌 Gastos fijos estables ('+p+'%)||Tienes '+fmtCOP(fijo)+' en compromisos fijos. Buen manejo — esto te da flexibilidad.');}
  if(catSorted.length>0){const [cat,val]=catSorted[0];const p=((val/totGastos)*100).toFixed(1);tips.push('🔍 Tu mayor gasto: '+cat+' ('+p+'%)||Gastaste '+fmtCOP(Math.round(val))+'. Es tu categoría principal — vale revisar si hay oportunidad de optimizar.');}
  if(bal>0&&totIngr>0){const anual=bal*12;tips.push('💡 Proyección anual: '+fmtCOP(anual)+'||Si mantienes este ritmo ahorras '+fmtCOP(anual)+' al año (≈'+fmtUSD(anual/rate)+' USD). Invertido con 10% anual, en 5 años serían '+fmtCOP(Math.round(anual*6.1))+'.');}
  renderAIModal(tips);
}

function getTotIngr(){
  return state.ingresos.reduce((s,i)=>{const b=toCOP(i.amount,i.currency);return s+(i.freq==='quincenal'?b*2:i.freq==='semanal'?b*4.33:i.freq==='anual'?b/12:b);},0);
}

function renderMiniChart(snaps){
  if(snaps.length<2) return `<div style="font-size:11px;color:#65657a;text-align:center;padding:8px 0">Registra 2+ actualizaciones para ver la gráfica</div>`;
  const vals=snaps.map(x=>x.valor),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,W=260,H=56;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*(H-8)-4}`).join(' ');
  const up=vals[vals.length-1]>=vals[0];
  const col=up?'#6af7a8':'#f76a6a';
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1))*W,y=H-((v-mn)/rng)*(H-8)-4;return`<circle cx="${x}" cy="${y}" r="3" fill="${col}"/>`;}).join('')}</svg>`;
}

    const[title,body]=tip.split('||');
    html+=`<div class="ai-tip"><div class="ai-tip-title">${title}</div>${body?`<div class="ai-tip-body">${body}</div>`:''}</div>`;
  });
  html+=`<button onclick="openAI()" style="width:100%;padding:11px;border-radius:10px;border:1px solid rgba(139,124,248,.3);background:rgba(139,124,248,.08);color:#8b7cf8;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px">🔄 Regenerar</button></div>`;
  el.innerHTML=html;
}

// ── Init ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
