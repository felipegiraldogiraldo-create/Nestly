// Initialize Firebase
const firebaseApp = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const NESTLY_USER = 'felipe'; // shared user

async function saveToCloud(data) {
  try {
    await db.collection('nestly').doc(NESTLY_USER).set(data);
  } catch(e) { console.error('Save error:', e); }
}

async function loadFromCloud() {
  try {
    const doc = await db.collection('nestly').doc(NESTLY_USER).get();
    if (doc.exists) return doc.data();
  } catch(e) { console.error('Load error:', e); }
  return null;
}

function useCloudSync(data, setData, ready, setReady) {
  // Load on mount
  React.useEffect(() => {
    loadFromCloud().then(cloudData => {
      if (cloudData && cloudData.gastos) {
        setData(cloudData);
      }
      setReady(true);
    });
  }, []);

  // Save on change (debounced)
  React.useEffect(() => {
    if (!ready) return;
    const t = setTimeout(() => saveToCloud(data), 1200);
    return () => clearTimeout(t);
  }, [data, ready]);

  // Real-time listener
  React.useEffect(() => {
    const unsub = db.collection('nestly').doc(NESTLY_USER)
      .onSnapshot(doc => {
        if (doc.exists) {
          const d = doc.data();
          setData(prev => {
            if (JSON.stringify(prev) !== JSON.stringify(d)) return d;
            return prev;
          });
        }
      });
    return () => unsub();
  }, []);
}

        </div>)}

      </div>

      {showPDF&&(<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowPDF(false);}}><div className="sheet"><div className="handle"/><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><span style={{fontWeight:800,fontSize:18}}>📄 Reporte PDF</span><button onClick={()=>setShowPDF(false)} style={{background:'transparent',border:`1px solid ${C.bor}`,color:C.muted,borderRadius:8,padding:'6px 11px',cursor:'pointer',fontSize:13,fontFamily:'Outfit,sans-serif'}}>Cerrar</button></div><div style={{fontSize:12,color:C.muted,marginBottom:14}}>{MONTHS[month]} {year} · {mGastos.length} transacciones · {fmtCOP(totGastos)}</div>{mGastos.length===0?<div style={{textAlign:'center',padding:'20px 0',color:C.muted}}>Sin gastos este mes</div>:<><div style={{fontSize:12,color:C.muted,marginBottom:10}}>Ajusta la clasificación si es necesario:</div><div style={{maxHeight:280,overflowY:'auto',marginBottom:14}}>{mGastos.map(g=>{const current=pdfTipos[g.id]||g.tipo||CAT_TIPO[g.cat]||'variable';return(<div key={g.id} style={{display:'flex',alignItems:'center',gap:8,background:C.sur2,borderRadius:10,padding:'9px 11px',marginBottom:6,border:`1px solid ${C.bor}`}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.desc}</div><div style={{fontSize:11,color:C.muted}}>{fmtDate(g.date)} · {fmt(g.amount,g.currency,rate)}</div></div><div style={{display:'flex',gap:4,flexShrink:0}}>{['fijo','variable','antojo'].map(t=>(<button key={t} onClick={()=>setPdfTipos(p=>({...p,[g.id]:t}))} style={{padding:'4px 7px',borderRadius:6,border:`1px solid ${current===t?TC[t]:C.bor}`,background:current===t?`${TC[t]}20`:C.sur,color:current===t?TC[t]:C.muted,fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'Outfit,sans-serif'}}>{TI[t]}</button>))}</div></div>);})}</div><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>{['fijo','variable','antojo'].map(t=>{const tot=mGastos.reduce((s,g)=>{const ct=pdfTipos[g.id]||g.tipo||CAT_TIPO[g.cat]||'variable';return ct===t?s+toCOP(g.amount,g.currency,rate):s;},0);return<div key={t} style={{background:`${TC[t]}10`,border:`1px solid ${TC[t]}30`,borderRadius:10,padding:'10px',textAlign:'center'}}><div style={{fontSize:10,color:TC[t],fontWeight:700,marginBottom:3}}>{TI[t]} {cap(t)}</div><div style={{fontSize:13,fontWeight:800,color:TC[t]}}>{fmtCOP(tot)}</div></div>;})}></div><button onClick={generatePDF} style={{width:'100%',padding:13,borderRadius:12,border:'none',background:'#6ab8f7',color:'#fff',fontFamily:'Outfit,sans-serif',fontSize:15,fontWeight:700,cursor:'pointer'}}>Generar e imprimir PDF</button></> }</div></div>)}

      {showAI&&(<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAI(false);}}><div className="sheet"><div className="handle"/><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><span style={{fontWeight:800,fontSize:18}}>✨ Consejos IA</span><button onClick={()=>setShowAI(false)} style={{background:'transparent',border:`1px solid ${C.bor}`,color:C.muted,borderRadius:8,padding:'6px 11px',cursor:'pointer',fontSize:13,fontFamily:'Outfit,sans-serif'}}>Cerrar</button></div><div style={{fontSize:12,color:C.muted,marginBottom:16}}>{MONTHS[month]} {year} · {fmtCOP(totGastos)} en gastos</div>{aiLoading?<div style={{textAlign:'center',padding:'32px 0'}}><div style={{fontSize:36,marginBottom:14}}>🤔</div><div style={{color:C.muted,fontSize:13,marginBottom:14}}>Analizando tus finanzas...</div><div style={{height:3,background:C.bor,borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:'40%',background:C.acc,borderRadius:99,animation:'shimmer 1.2s infinite'}}/></div></div>:<div>{aiTips.split('\n\n').filter(Boolean).map((tip,i)=>{const lines=tip.split('\n'),title=lines[0]||'',body=lines.slice(1).join(' ').trim();return(<div key={i} style={{background:C.sur2,borderRadius:12,padding:'14px',marginBottom:10,border:`1px solid rgba(139,124,248,.2)`}}><div style={{fontSize:14,fontWeight:700,color:C.acc,marginBottom:body?6:0}}>{title}</div>{body&&<div style={{fontSize:13,color:C.text,lineHeight:1.55}}>{body}</div>}</div>);})}<button onClick={fetchAITips} style={{width:'100%',padding:11,borderRadius:10,border:`1px solid rgba(139,124,248,.3)`,background:'rgba(139,124,248,.08)',color:C.acc,fontFamily:'Outfit,sans-serif',fontSize:13,fontWeight:600,cursor:'pointer',marginTop:4}}>🔄 Regenerar</button></div>}</div></div>)}

      {showCfg&&(<div className="overlay" onClick={e=>{if(e.target===e.currentTarget){setShowCfg(false);setEditId(undefined);}}}><div className="sheet"><div className="handle"/><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}><span style={{fontWeight:800,fontSize:18}}>⚙️ Configuración</span><button onClick={()=>{setShowCfg(false);setEditId(undefined);}} style={{background:'transparent',border:`1px solid ${C.bor}`,color:C.muted,borderRadius:8,padding:'6px 11px',cursor:'pointer',fontSize:13,fontFamily:'Outfit,sans-serif'}}>Cerrar</button></div>{editId===undefined&&(<div style={{display:'flex',gap:6,marginBottom:20}}>{[['medios','💳 Medios'],['app','⚙️ App']].map(([k,l])=>(<button key={k} onClick={()=>setCfgTab(k)} style={{padding:'7px 14px',borderRadius:8,border:`1px solid ${cfgTab===k?C.acc:C.bor}`,background:cfgTab===k?'rgba(139,124,248,.12)':'transparent',color:cfgTab===k?C.acc:C.muted,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Outfit,sans-serif'}}>{l}</button>))}</div>)}{cfgTab==='medios'&&(editId!==undefined?renderMedioForm():renderMediosList())}{cfgTab==='app'&&editId===undefined&&(<div className="fin"><div className="sdiv">Tasa de cambio</div><div style={{background:C.sur2,borderRadius:12,padding:14,border:`1px solid ${C.bor}`,marginBottom:16}}><div style={{fontSize:13,color:C.muted,marginBottom:8}}>1 USD = ? COP</div><input type="text" inputMode="numeric" value={rateStr} onChange={e=>setRateStr(e.target.value)} onBlur={()=>{const v=parseFloat(rateStr);if(!isNaN(v)&&v>0){setRate(v);setRateStr(String(v));}else{setRateStr(String(rate));}}} style={{...inp,fontSize:16,fontWeight:600}}/><div style={{fontSize:11,color:C.muted,marginTop:6}}>Para convertir USD a COP</div></div><div className="sdiv">Peligro</div><ConfirmDelete onConfirm={()=>{setData(DEFAULT);setRate(4200);setRateStr('4200');setShowCfg(false);T('🗑️ Datos eliminados');}}/></div>)}</div></div>)}

      {toast&&(<div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:C.sur2,border:`1px solid ${C.acc}`,color:C.text,padding:'12px 20px',borderRadius:12,fontSize:13,zIndex:999,whiteSpace:'nowrap',boxShadow:'0 4px 24px rgba(0,0,0,.6)'}}>{toast}</div>)}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
